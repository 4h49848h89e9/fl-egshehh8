name: Build and Release Windows App

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'

    - name: Enable Windows desktop support
      run: flutter config --enable-windows-desktop

    - name: Create Windows project files
      run: flutter create --platforms=windows .

    - name: Get dependencies
      run: flutter pub get

    - name: Build Windows app
      run: flutter build windows --release

    - name: List build output
      run: dir build\windows\x64\runner\Release

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-app
        path: build/windows/x64/runner/Release/
        retention-days: 30

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download Windows build
      uses: actions/download-artifact@v4
      with:
        name: windows-app
        path: windows-app

    - name: Zip the Windows app
      run: |
        cd windows-app
        zip -r ../simple-flutter-app-windows.zip .

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: simple-flutter-app-windows.zip
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}